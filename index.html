<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Industra Report</title>
  <style>
    :root {
      --blue: rgb(0, 0, 255);
      --yellow: rgb(255, 247, 42);
      --gray: rgb(235, 235, 235);
      --black: #000;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--gray);
      color: var(--black);
      font-family: "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      border: 1px solid var(--black);
      background: #fff;
      padding: 28px;
      width: min(92vw, 560px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.4rem;
      font-weight: 900;
      line-height: 1.1;
    }

    p {
      margin: 0 0 16px;
      font-size: 0.95rem;
      line-height: 1.35;
    }

    a {
      display: inline-block;
      padding: 10px 14px;
      font-weight: 800;
      text-decoration: none;
      border: 1px solid var(--black);
      color: var(--black);
      background: var(--yellow);
    }

    a:hover,
    a:focus-visible {
      background: var(--blue);
      color: #fff;
      outline: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Industra Coffee</h1>
    <p>Klikni a otevřeš měřicí report.</p>
    <a href="report_karty.html">Industra</a>
  </main>
</body>
</html>
