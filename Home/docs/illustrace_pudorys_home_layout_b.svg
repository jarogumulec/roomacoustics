  <text x="910" y="206" class="txt">1.95 m střed-střed</text>

  <circle cx="964" cy="362" r="8" class="pos"/>
  <text x="980" y="356" class="txt">u TV</text>
  <text x="980" y="378" class="small">nová osa, cca 1.80 m od přední stěny</text>

  <circle cx="964" cy="733" r="8" class="pos"/>
  <text x="980" y="727" class="txt">poslech sedačka</text>
  <text x="980" y="749" class="small">Layout B, v ose repro</text>

  <circle cx="670" cy="453" r="8" class="pos"/>
  <text x="686" y="447" class="txt">střed obýváku</text>
  <text x="686" y="469" class="small">orientační L+R reference</text>

  <circle cx="908" cy="733" r="6" class="measure"/>
  <text x="862" y="764" class="small">M1 sedačka vlevo</text>
  <circle cx="1020" cy="733" r="6" class="measure"/>
  <text x="996" y="764" class="small">M2 sedačka vpravo</text>
  <circle cx="964" cy="650" r="6" class="measure"/>
  <text x="980" y="654" class="small">M3 před sedačkou</text>
  <circle cx="530" cy="453" r="6" class="measure"/>
  <text x="430" y="447" class="small">M4 levá střední zóna</text>
  <circle cx="1090" cy="453" r="6" class="measure"/>
  <text x="1104" y="447" class="small">M5 pravá střední zóna</text>
