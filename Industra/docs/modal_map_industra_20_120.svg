  <rect class="bg" x="0" y="0" width="1200" height="520" />
  <text class="title" x="56" y="42">Industra · Modal Map 20-120 Hz</text>
  <text class="subtitle" x="56" y="66">Axiální módy ideálního kvádru + pracovní Schröderova frekvence a problémová pásma z měření.</text>

  <rect class="peak" x="196.4" y="96" width="96.8" height="332" rx="6" />
  <rect class="transition" x="400.0" y="96" width="48.4" height="332" rx="6" />
