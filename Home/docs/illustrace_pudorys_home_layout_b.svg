<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="920" viewBox="0 0 1460 920">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <style>
      .room { fill:#f8fafc; stroke:#334155; stroke-width:3; }
      .speaker { fill:#2563eb; stroke:#1e3a8a; stroke-width:2; }
      .center { fill:#f8fafc; stroke:#1e3a8a; stroke-width:1.8; }
      .coord-axis { stroke:#0f766e; stroke-width:2.2; marker-end:url(#arrow); }
      .axis { stroke:#94a3b8; stroke-width:1.6; stroke-dasharray:6 5; }
      .dim { stroke:#64748b; stroke-width:2; marker-start:url(#arrow); marker-end:url(#arrow); }
      .guide { stroke:#cbd5e1; stroke-width:1.2; stroke-dasharray:5 4; }
      .detail { fill:#ffffff; stroke:#94a3b8; stroke-width:2; }
      .detail-wall { fill:#dbe4f0; stroke:#94a3b8; stroke-width:1.5; }
      .detail-speaker { fill:#2563eb; stroke:#1e3a8a; stroke-width:2; }
      .tv { fill:#0f766e; opacity:0.18; stroke:#0f766e; stroke-width:2; }
      .window { fill:#38bdf8; opacity:0.22; stroke:#0284c7; stroke-width:3; }
      .bookshelf { fill:#d7c7b8; opacity:0.7; stroke:#8a6e55; stroke-width:2.2; }
      .desk { fill:#a78bfa; opacity:0.18; stroke:#6d28d9; stroke-width:2.5; }
      .door { stroke:#ef4444; stroke-width:6; }
      .sofa { fill:#f59e0b; opacity:0.16; stroke:#b45309; stroke-width:2.5; }
      .origin { fill:#0f766e; }
      .measure { fill:#16a34a; stroke:#166534; stroke-width:1.6; }
      .txt { font: 18px 'Segoe UI', sans-serif; fill:#0f172a; }
      .small { font: 14px 'Segoe UI', sans-serif; fill:#334155; }
      .title { font: 26px 'Segoe UI Semibold', sans-serif; fill:#0f172a; }
      .pos { fill:#dc2626; }
    </style>
  </defs>

  <text x="48" y="42" class="title">Home · technický půdorys · Layout B</text>
  <text x="48" y="68" class="small">Budoucí měřicí geometrie po posunu pravého repro a TV. Původní měření zůstávají v Layout A.</text>

  <rect x="180" y="110" width="980" height="686" class="room"/>

  <circle cx="180" cy="110" r="5" class="origin"/>
  <text x="192" y="104" class="small">0,0</text>
  <line x1="180" y1="110" x2="180" y2="230" class="coord-axis"/>
  <line x1="180" y1="110" x2="300" y2="110" class="coord-axis"/>
  <text x="188" y="244" class="small">x do hloubky</text>
  <text x="308" y="104" class="small">y doprava</text>

  <circle cx="1280" cy="88" r="4" class="origin"/>
