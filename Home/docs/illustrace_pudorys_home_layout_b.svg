  <text x="274" y="718" class="small">u levé stěny</text>
  <line x1="180" y1="362" x2="180" y2="558" class="door"/>
  <line x1="180" y1="362" x2="212" y2="362" class="guide"/>
  <line x1="180" y1="558" x2="212" y2="558" class="guide"/>
