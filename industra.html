  <script id="md-aktualni" type="text/plain">## Data a hlavní zjištění (30.4.2026)

- Zdroj: REW export `text_export/` + grafy `graphs_export/`
- Měření: L+R, setup 2x EON715 + 2x PRX818XLF, sweep bez timing reference

## Co je problém

- Peak: **90.61 dB @ 39.71 Hz** (pásmo 35-45 Hz) = přebytek energie / dunění
- Minimum: **78.52 dB @ 77.16 Hz** (pásmo 70-100 Hz) = slabší punch/kick
- Průměr 70-90 Hz: **83.41 dB**
- Průměr 90-120 Hz: **86.95 dB**
- Rozdíl: cca **+3.54 dB** ve prospěch 90-120 Hz
- T30: 50-125 Hz **2.09 s**, 160-1000 Hz **1.85 s**, 1250-10000 Hz **1.08 s**

Interpretace: prostor přidává subbasový tlak a současně rozmazává atak kopáku. Vnímaný výsledek je měkčí bas bez jasné hrany v kritickém pásmu kolem crossoveru.

## Co to pravděpodobně způsobuje

- Room módy velké haly (14.8 x 12.2 x 11.6 m)
- Geometrie systému: suby jsou o 0.5 m před topy + výškový rozdíl center 1.45 m
- Měření bez timing reference, takže přesný sub/top time offset není potvrzený
- Mikrofon pouze v jednom hlavním bodě, bez rozhodnutí podle průměru více pozic

## Praktické závěry pro další ladění

1. Neřešit finální PEQ před timingem.
2. Ověřit zvlášť bedny a full kombinaci.
3. Rozhodovat podle 70-100 Hz + kontrola decay, ne jen podle jedné SPL křivky.

## Grafy

### Figure 1: SPL + fáze

![SPL](Industra/measurements/2026-04-30_jbl-mejdan/graphs_export/01_SPL.png)

Popis:
- Dominantní energetický vrchol je kolem 40 Hz, což odpovídá subjektivnímu dunění.
- V pásmu 70-100 Hz je patrný propad, který oslabuje punch kopáku.
- Právě tento rozsah je klíčový pro timing sub/top a pro čitelnost rytmu na parketu.

Praktický závěr:
- Při příštím ladění použít 70-100 Hz jako hlavní rozhodovací pásmo pro delay/polaritu.

### Figure 2: Decay

![Decay](Industra/measurements/2026-04-30_jbl-mejdan/graphs_export/04_decay.png)

Popis:
- Nízké frekvence doznívají déle než střední a vysoké pásmo.
- Delší doznívání v basech zhoršuje separaci kick/bass line i při podobném SPL.

Praktický závěr:
- Úspěch ladění nehodnotit jen podle amplitudy, ale i podle zkrácení doznívání v LF oblasti.

### Figure 3: Waterfall

![Waterfall](Industra/measurements/2026-04-30_jbl-mejdan/graphs_export/05_waterfall.png)

Popis:
- Waterfall potvrzuje, že nízkofrekvenční energie v prostoru zůstává déle a akumuluje se v čase.
- Problém není pouze jednorázový peak, ale i časové chování místnosti.

Praktický závěr:
- Cílem je kombinace: menší peak 35-45 Hz + kratší doznívání + stabilnější 70-100 Hz mezi více body měření.</script>

  <script id="md-room" type="text/plain">## Prostor

- Industra Coffee, Brno
- Rozměry: **14.8 x 12.2 x 11.6 m**
- Charakter: velká hala, otevřený prostor, tvrdé povrchy

### Kritický dopad prostoru

- Velká výška stropu + tvrdé plochy: delší LF decay
- Otevřený layout: nerovnoměrná distribuce basu v různých bodech
- Reálný problém je stabilita výsledku v ploše, ne jen SPL v jednom bodě

## PA Postavení

- **Čelo PA:** 6.0 m od stěny s barem, 4.5 m od stěny s dveřmi
- **Natočení:** cca 45°
- **Topy:** 1.9 m výška, 2.3 m střed-střed
- **Suby:** 0.45 m výška, 0.72 m střed-střed, o 0.5 m vpředu

### Geometrie a timing riziko

- Výškový rozdíl center top/sub: 1.45 m
- Předozadní offset: 0.5 m (sub blíž k publiku)
- Kombinace obou offsetů přidává pásmově závislou interferenci kolem dělení

## Měřicí bod

- **M1:** 2.5 m od PA, čelní osa, 0.8 m výška
- Další body: doporučeno min. +2 body (+/- 1 m) pro robustní rozhodnutí

## DSP Aktuálně

- Interface: Scarlett 2i2
- Crossover: 80 Hz LR24
- Polarity: normal
- Delay: pracovní stav bez finálního alignmentu
- Gain: topy 0 dB, suby cca 2/3

![Půdorys](Industra/docs/illustrace_pudorys_meritko.svg)</script>

  <script id="md-plan" type="text/plain">## Cíl další série

- Odladit delay (sub vs top) v pásmu 70–100 Hz
- Snížit boom 35–45 Hz
- Ověřit s timing reference (loopback)

## Příprava před prvním sweepem

1. Timing reference: loopback (vstup = výstup reference)
2. Gain: fixní, bez změn v sérii
3. Pozice: M1 primární, případně +2 body okolo
4. Zapsat výchozí routing, polaritu, crossover a delay

## Ověření postavení (před timing maticí)

1. Varianta A: stávající (suby o 0.5 m vpředu)
2. Varianta B: topy níž a hloubkově zarovnané se suby

Pro obě varianty změřit minimálně:
1. `SUB_ONLY_LR`
2. `TOP_ONLY_LR`
3. `FULL_LR_base`

## Měřicí plán

### Oddělená měření
- `SUB_LEFT`
- `SUB_RIGHT`
- `TOP_LEFT`
- `TOP_RIGHT`
- `SUB_ONLY_LR`
- `TOP_ONLY_LR`

### Baseline FULL
- `FULL_LR` (0.0 ms delay, normal polarity)

### Delay matrix
- Delay: 0.0, 0.2, 0.4, 0.6 ms
- Každý delay: normal + inverted
- Podle výsledku doplnit jemný krok 0.1 ms kolem nejlepší varianty

### Výběr nejlepší varianty
- Primárně podle M1 (pásmo 70–100 Hz)
- Verifikace na vedlejších bodech
- Neklesnout do výrazně horšího decay v basech

## Export
SPL+Phase, Impulse, RT60, Decay, Waterfall, `.mdat`

## Finální preset
Až po potvrzení timingu a sub/top poměru.</script>

  <script id="md-specs" type="text/plain">## Equipment přehled

### Aktivní systém

- 2x JBL EON715 (TOP_LEFT, TOP_RIGHT)
- 2x JBL PRX818XLF (SUB_LEFT, SUB_RIGHT)
- Interface: Scarlett 2i2 4th Gen
- Routing: topy napájené přes sub out

### JBL EON715 (topy)

- Max SPL: 128 dB
- Rozsah (-3 dB): 55 Hz–20 kHz
- Pokrytí: 90° x 60°
- DSP: PEQ, delay (až 100 ms), ochrany

### JBL PRX818XLF (suby)

- Max SPL: 134 dB
- Rozsah (-3 dB): 35–87 Hz
- Crossover: 80 Hz, LR 24 dB/oct
- DSP: limiter, EQ, polarity

### Praktické důsledky pro tuning

- Crossover 80 Hz je správný výchozí bod
- Pod cca 35 Hz netlačit zbytečně energii do room módů
- Největší zisk je ve správném timingu sub/top, ne v agresivním EQ

### Poznámka

Datasheets řeší parametry beden, ne akustiku místnosti. Finální výsledek určuje měření v prostoru.</script>

  <script>
    const MARKDOWN = {
      aktualni: document.getElementById('md-aktualni').textContent,
      room: document.getElementById('md-room').textContent,
      plan: document.getElementById('md-plan').textContent,
      specs: document.getElementById('md-specs').textContent
    };

    const EMBEDDED_IMAGES = {};

    function simpleMarkdown(md) {
      return md
        .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
        .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/!\[(.*?)\]\((.*?)\)/g, (m, alt, src) => {
          const imgData = EMBEDDED_IMAGES[src] || src;
          return `<img src="${imgData}" alt="${alt}" />`;
        })
        .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2">$1</a>')
        .replace(/^- (.*?)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, (m) => '<ul>' + m + '</ul>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^(?!<[h|u|p|i|a|l])(.*?)$/gm, '<p>$1</p>');
    }

    async function loadImages() {
      const paths = [
        'Industra/docs/illustrace_pudorys_meritko.svg',
        'Industra/measurements/2026-04-30_jbl-mejdan/graphs_export/01_SPL.png',
        'Industra/measurements/2026-04-30_jbl-mejdan/graphs_export/04_decay.png',
        'Industra/measurements/2026-04-30_jbl-mejdan/graphs_export/05_waterfall.png'
      ];

      for (const p of paths) {
        try {
          const r = await fetch(p);
          if (r.ok) {
            const b = await r.blob();
            const fr = new FileReader();
            fr.onload = (e) => { EMBEDDED_IMAGES[p] = e.target.result; };
            fr.readAsDataURL(b);
          }
        } catch (err) {}
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await loadImages();
      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.dataset.key;
        el.innerHTML = simpleMarkdown(MARKDOWN[key] || '');
      });

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const panelId = btn.dataset.panel;
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.getElementById(panelId).classList.add('active');
          btn.classList.add('active');
        });
      });
    });
  </script>
