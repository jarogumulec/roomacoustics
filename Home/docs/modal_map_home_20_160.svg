<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540">
  <style>
    .bg { fill: #fafafa; }
    .axis { stroke: #111; stroke-width: 2; }
    .grid { stroke: #d7d7d7; stroke-width: 1; }
    .label { font: 14px Helvetica, Arial, sans-serif; fill: #111; }
    .small { font: 12px Helvetica, Arial, sans-serif; fill: #333; }
    .title { font: 700 24px Helvetica, Arial, sans-serif; fill: #111; }
    .subtitle { font: 14px Helvetica, Arial, sans-serif; fill: #333; }
    .len { stroke: #1f5eff; stroke-width: 3; }
    .wid { stroke: #d97706; stroke-width: 3; }
    .hei { stroke: #0f766e; stroke-width: 3; }
    .sch { stroke: #111; stroke-width: 2.5; stroke-dasharray: 10 8; }
    .bandA { fill: rgba(239, 68, 68, 0.16); stroke: #ef4444; stroke-width: 1.5; }
    .bandB { fill: rgba(245, 158, 11, 0.16); stroke: #f59e0b; stroke-width: 1.5; }
    .bandC { fill: rgba(59, 130, 246, 0.12); stroke: #3b82f6; stroke-width: 1.5; }
  </style>
  <rect class="bg" x="0" y="0" width="1200" height="540" />
  <text class="title" x="56" y="42">Home · Modal Map 20-160 Hz</text>
  <text class="subtitle" x="56" y="66">Axiální módy z rozměrů 4.9 × 7.0 × 3.3 m, problémové shluky a pracovní Schröderova frekvence.</text>

  <rect class="bandA" x="281.1" y="96" width="57.1" height="332" rx="6" />
  <rect class="bandB" x="449.3" y="96" width="36.7" height="332" rx="6" />
  <rect class="bandC" x="657.1" y="96" width="57.1" height="332" rx="6" />
  <text class="small" x="289" y="116">44-52 Hz</text>
  <text class="small" x="452" y="116">70-74 Hz</text>
  <text class="small" x="666" y="116">98-105 Hz</text>

