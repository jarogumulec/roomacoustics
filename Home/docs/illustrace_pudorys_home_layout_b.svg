  <text x="314" y="724" class="small">M6 levý zadní roh</text>
  <circle cx="1040" cy="720" r="6" class="measure"/>
  <text x="1054" y="724" class="small">M7 pravý zadní roh</text>

  <line x1="964" y1="142.27" x2="964" y2="720" class="axis"/>
  <text x="980" y="136" class="small">hlavní osa poslechu</text>

  <text x="558" y="100" class="small">stěna za repro / TV stěna</text>

  <rect x="810.28" y="119.1" width="27.72" height="46.34" class="speaker"/>
  <rect x="1083.28" y="119.1" width="27.72" height="46.34" class="speaker"/>
  <circle cx="824.14" cy="142.27" r="4.2" class="center"/>
  <circle cx="1097.14" cy="142.27" r="4.2" class="center"/>

  <rect x="1190" y="372" width="230" height="220" class="detail"/>
  <text x="1210" y="402" class="txt">Detail u stěny</text>
  <rect x="1218" y="426" width="172" height="18" class="detail-wall"/>
