  <text x="1184" y="344" class="small">x=1.20 až 3.30 m</text>

  <rect x="180" y="110" width="252" height="42" class="bookshelf"/>
  <rect x="180" y="110" width="42" height="182" class="bookshelf"/>
  <text x="238" y="206" class="small">knihovna L</text>
