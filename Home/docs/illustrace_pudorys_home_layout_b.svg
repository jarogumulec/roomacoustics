  <line x1="1303" y1="444" x2="1303" y2="476" class="dim"/>
  <text x="1316" y="464" class="small">6.5 cm</text>
  <line x1="1346" y1="476" x2="1412" y2="476" class="dim"/>
  <text x="1358" y="468" class="small">35 cm</text>
  <line x1="1254" y1="476" x2="1254" y2="566" class="dim"/>
  <text x="1224" y="526" class="small" transform="rotate(-90 1224,526)">33.1 cm hloubka</text>
  <line x1="1276" y1="584" x2="1330" y2="584" class="dim"/>
  <text x="1282" y="604" class="small">19.8 cm šířka</text>
  <text x="1210" y="548" class="small">Layout B je budoucí reference pro další měření.</text>
  <text x="1210" y="570" class="small">Layout A zůstává historická reference původní série.</text>

  <text x="1190" y="640" class="txt">Layout B poznámky</text>
  <text x="1190" y="670" class="small">- pravý repro: střed cca 45 cm od pravé stěny</text>
  <text x="1190" y="696" class="small">- pravá bočnice skříně: cca 35 cm od pravé stěny</text>
  <text x="1190" y="722" class="small">- TV střed nově cca y=5.60 m od levé stěny</text>
  <text x="1190" y="748" class="small">- zelené body M1 až M7 patří jen k Layout B</text>
  <text x="1190" y="774" class="small">- M1 až M3 = poslechová zóna, M4 až M5 = střední pole</text>
  <text x="1190" y="800" class="small">- M6 až M7 = rychlá LF kontrola rohů / modů</text>
</svg>